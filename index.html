<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>aTyp — A guide for parents of children with autism</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root { color-scheme: light; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', -apple-system, system-ui, sans-serif;
      background: #EFECE4;
      color: #1B2421;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    /* layout */
    .atyp-stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 56px;
      padding: 40px 24px;
      box-sizing: border-box;
      background:
        radial-gradient(40% 40% at 18% 22%, rgba(116,198,157,0.12), transparent 70%),
        radial-gradient(30% 30% at 82% 80%, rgba(45,106,79,0.10), transparent 70%),
        #EFECE4;
    }
    .atyp-caption {
      width: 280px;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 20px;
    }
    @media (max-width: 880px) {
      .atyp-stage { flex-direction: column; gap: 24px; padding: 24px 16px; }
      .atyp-caption { width: 100%; max-width: 360px; order: 2; }
    }
    /* hide all scrollbars inside the device */
    .atyp-stage *::-webkit-scrollbar { display: none; }
    .atyp-stage * { scrollbar-width: none; }
    button { font-family: inherit; }

    /* Pulse animation for current map node */
    @keyframes atypPulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @keyframes atypFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes atypSheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    /* Home intro greeting */
    @keyframes atypBubbleIn { from { opacity: 0; transform: translateY(26px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes atypIntroOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes atypRiseFade { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="atyp-icons.jsx"></script>
  <script type="text/babel" src="atyp-shared.jsx"></script>
  <script type="text/babel" src="atyp-onboarding.jsx"></script>
  <script type="text/babel" src="atyp-gps-data.jsx"></script>
  <script type="text/babel" src="atyp-map.jsx"></script>
  <script type="text/babel" src="atyp-home.jsx"></script>
  <script type="text/babel" src="atyp-marketplace.jsx"></script>
  <script type="text/babel" src="atyp-tabs.jsx"></script>
  <script type="text/babel" src="atyp-profile-sections.jsx"></script>
  <script type="text/babel" src="atyp-app.jsx"></script>
</body>
</html>
