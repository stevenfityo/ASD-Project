name: Deploy to GitHub Pages

# Publishes the static prototype (index.html + .jsx served via in-browser Babel)
# to GitHub Pages whenever main is updated. Also runnable manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The app is fully static — publish the repository root as-is.
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
