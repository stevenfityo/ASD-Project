<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>aTyp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#EFECE4"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root { color-scheme: light; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Manrope', -apple-system, system-ui, sans-serif;
      background: #EFECE4;
      color: #1B2421;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; }
    button { font-family: inherit; }

    /* Pulse animation for current map node */
    @keyframes atypPulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @keyframes atypFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes atypSheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    /* Home intro greeting */
    @keyframes atypBubbleIn { from { opacity: 0; transform: translateY(26px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes atypIntroOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes atypRiseFade { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>



  <script>window.ATYP_MOBILE = true;</script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="atyp-icons.jsx"></script>
  <script type="text/babel" src="atyp-shared.jsx"></script>
  <script type="text/babel" src="atyp-onboarding.jsx"></script>
  <script type="text/babel" src="atyp-gps-data.jsx"></script>
  <script type="text/babel" src="atyp-map.jsx"></script>
  <script type="text/babel" src="atyp-home.jsx"></script>
  <script type="text/babel" src="atyp-marketplace.jsx"></script>
  <script type="text/babel" src="atyp-tabs.jsx"></script>
  <script type="text/babel" src="atyp-profile-sections.jsx"></script>
  <script type="text/babel" src="atyp-app.jsx"></script>
</body>
</html>
